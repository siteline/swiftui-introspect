name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"
  schedule:
    - cron: "3 3 * * 2" # 3:03 AM, every Tuesday

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  RUNTIME_CI_XCODE: "26.0.1"
  TOOLING_XCODE: "26.2"

jobs:
  # TODO: Re-enable when --ifdef no-indent works as intended
  # lint:
  #   name: Lint
  #   runs-on: macos-latest
  #   steps:
  #     - name: Git Checkout
  #       uses: actions/checkout@v5

  #     - name: Install SwiftFormat
  #       run: |
  #         brew unlink swiftformat
  #         brew install swiftformat --HEAD

  #     - name: SwiftFormat Lint
  #       run: swiftformat --lint . --reporter github-actions-log

  lint-podspec:
    if: github.event_name != 'pull_request' || !contains(github.event.pull_request.title, '[skip ci]')
    name: Lint Podspec
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Git Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # required to be able to find Git tags

      - name: Select Xcode ${{ env.TOOLING_XCODE }}
        run: sudo xcodes select ${{ env.TOOLING_XCODE }}

      - name: Lint Podspec
        run: |
          set -eo pipefail
          LIB_VERSION=$(git describe --tags "$(git rev-list --tags --max-count=1)")
          export LIB_VERSION
          pod lib lint SwiftUIIntrospect.podspec --allow-warnings

  ci:
    if: github.event_name != 'pull_request' || !contains(github.event.pull_request.title, '[skip ci]')
    name: ${{ matrix.name }}
    runs-on: macos-26
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: iOS 15.5
            runtime: iOS 15.5
            simulator_platform: ios
            major: 15
            destination: ""
            build_scheme: Showcase
            test_scheme: SwiftUIIntrospectTests
          - name: iOS 16.4
            runtime: iOS 16.4
            simulator_platform: ios
            major: 16
            destination: ""
            build_scheme: Showcase
            test_scheme: SwiftUIIntrospectTests
          - name: iOS 17.5
            runtime: iOS 17.5
            simulator_platform: ios
            major: 17
            destination: ""
            build_scheme: Showcase
            test_scheme: SwiftUIIntrospectTests
          - name: iOS 18.6
            runtime: iOS 18.6
            simulator_platform: ios
            major: 18
            destination: ""
            build_scheme: Showcase
            test_scheme: SwiftUIIntrospectTests
          - name: iOS 26.0
            runtime: iOS 26.0
            simulator_platform: ios
            major: 26
            destination: ""
            build_scheme: Showcase
            test_scheme: SwiftUIIntrospectTests

          - name: iPadOS 15.5
            runtime: iOS 15.5
            simulator_platform: ipados
            major: 15
            destination: ""
            build_scheme: Showcase
            test_scheme: SwiftUIIntrospectTests
          - name: iPadOS 16.4
            runtime: iOS 16.4
            simulator_platform: ipados
            major: 16
            destination: ""
            build_scheme: Showcase
            test_scheme: SwiftUIIntrospectTests
          - name: iPadOS 17.5
            runtime: iOS 17.5
            simulator_platform: ipados
            major: 17
            destination: ""
            build_scheme: Showcase
            test_scheme: SwiftUIIntrospectTests
          - name: iPadOS 18.6
            runtime: iOS 18.6
            simulator_platform: ipados
            major: 18
            destination: ""
            build_scheme: Showcase
            test_scheme: SwiftUIIntrospectTests
          - name: iPadOS 26.0
            runtime: iOS 26.0
            simulator_platform: ipados
            major: 26
            destination: ""
            build_scheme: Showcase
            test_scheme: SwiftUIIntrospectTests

          - name: macCatalyst 15.0
            runtime: ""
            simulator_platform: ""
            major: 0
            destination: "platform=macOS,variant=Mac Catalyst"
            build_scheme: Showcase
            test_scheme: SwiftUIIntrospectTests
          - name: macOS 15.0
            runtime: ""
            simulator_platform: ""
            major: 0
            destination: "platform=macOS"
            build_scheme: Showcase
            test_scheme: SwiftUIIntrospectTests

          - name: tvOS 15.4
            runtime: tvOS 15.4
            simulator_platform: tvos
            major: 15
            destination: ""
            build_scheme: Showcase
            test_scheme: SwiftUIIntrospectTests
          - name: tvOS 16.4
            runtime: tvOS 16.4
            simulator_platform: tvos
            major: 16
            destination: ""
            build_scheme: Showcase
            test_scheme: SwiftUIIntrospectTests
          - name: tvOS 17.5
            runtime: tvOS 17.5
            simulator_platform: tvos
            major: 17
            destination: ""
            build_scheme: Showcase
            test_scheme: SwiftUIIntrospectTests
          - name: tvOS 18.5
            runtime: tvOS 18.5
            simulator_platform: tvos
            major: 18
            destination: ""
            build_scheme: Showcase
            test_scheme: SwiftUIIntrospectTests
          - name: tvOS 26.0
            runtime: tvOS 26.0
            simulator_platform: tvos
            major: 26
            destination: ""
            build_scheme: Showcase
            test_scheme: SwiftUIIntrospectTests

          - name: visionOS 1.2
            runtime: visionOS 1.2
            simulator_platform: visionos
            major: 1
            destination: ""
            build_scheme: Showcase
            test_scheme: SwiftUIIntrospectTests
          - name: visionOS 2.5
            runtime: visionOS 2.5
            simulator_platform: visionos
            major: 2
            destination: ""
            build_scheme: Showcase
            test_scheme: SwiftUIIntrospectTests
          - name: visionOS 26.0
            runtime: visionOS 26.0
            simulator_platform: visionos
            major: 26
            destination: ""
            build_scheme: Showcase
            test_scheme: SwiftUIIntrospectTests

          - name: watchOS 8.5
            runtime: watchOS 8.5
            simulator_platform: watchos
            major: 8
            destination: ""
            build_scheme: SwiftUIIntrospect
            test_scheme: ""
          - name: watchOS 9.4
            runtime: watchOS 9.4
            simulator_platform: watchos
            major: 9
            destination: ""
            build_scheme: SwiftUIIntrospect
            test_scheme: ""
          - name: watchOS 10.5
            runtime: watchOS 10.5
            simulator_platform: watchos
            major: 10
            destination: ""
            build_scheme: SwiftUIIntrospect
            test_scheme: ""
          - name: watchOS 11.5
            runtime: watchOS 11.5
            simulator_platform: watchos
            major: 11
            destination: ""
            build_scheme: SwiftUIIntrospect
            test_scheme: ""
          - name: watchOS 26.0
            runtime: watchOS 26.0
            simulator_platform: watchos
            major: 26
            destination: ""
            build_scheme: SwiftUIIntrospect
            test_scheme: ""
    steps:
      - name: Git Checkout
        uses: actions/checkout@v5

      - name: Select Xcode ${{ env.RUNTIME_CI_XCODE }}
        run: sudo xcodes select ${{ env.RUNTIME_CI_XCODE }}

      - if: ${{ matrix.runtime != '' }}
        name: Ensure ${{ matrix.runtime }} Runtime
        run: script/install_runtime --runtime "${{ matrix.runtime }}"

      - if: ${{ matrix.simulator_platform != '' }}
        name: Create ${{ matrix.name }} Simulator
        run: |
          set -euo pipefail
          OUTPUT=$(script/create_simulators --platform ${{ matrix.simulator_platform }} --version ${{ matrix.major }} | tee /dev/stderr)
          FIRST_UDID=$(printf "%s\n" "$OUTPUT" | awk '/^(Created:|Already exists:)/{print $NF; exit}')
          if [ -n "$FIRST_UDID" ]; then
            echo "DESTINATION=id=$FIRST_UDID" >> "$GITHUB_ENV"
            echo "Captured DESTINATION=id=$FIRST_UDID"
          else
            echo "Failed to capture simulator UDID" >&2
            exit 1
          fi

      - if: ${{ matrix.destination != '' }}
        name: Set Host Destination
        run: echo "DESTINATION=${{ matrix.destination }}" >> "$GITHUB_ENV"

      - name: List Available Runtimes, Simulators, and Destinations
        run: |
          xcrun simctl list
          xcodebuild -scheme "${{ matrix.build_scheme }}" -showdestinations

      - name: Build ${{ matrix.build_scheme }}
        run: |
          script/run_xcodebuild \
            --action build \
            --scheme "${{ matrix.build_scheme }}" \
            --destination "$DESTINATION" \
            --configuration Debug

      - if: ${{ matrix.test_scheme != '' }}
        name: Run Tests
        run: |
          script/run_xcodebuild \
            --action test \
            --scheme "${{ matrix.test_scheme }}" \
            --destination "$DESTINATION" \
            --configuration Debug

  framework-archiving:
    if: github.event_name != 'pull_request' || !contains(github.event.pull_request.title, '[skip ci]')
    name: Archive Framework (${{ matrix.name }})
    runs-on: macos-26
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: iOS
            destination: "generic/platform=iOS"
          - name: macCatalyst
            destination: "platform=macOS,variant=Mac Catalyst"
          - name: macOS
            destination: "generic/platform=macOS"
          - name: tvOS
            destination: "generic/platform=tvOS"
          - name: visionOS
            destination: "generic/platform=visionOS"
          - name: watchOS
            destination: "generic/platform=watchOS"
    steps:
      - name: Git Checkout
        uses: actions/checkout@v5

      - name: Select Xcode ${{ env.TOOLING_XCODE }}
        run: sudo xcodes select ${{ env.TOOLING_XCODE }}

      - name: Archive Framework
        run: |
          script/run_xcodebuild \
            --action archive \
            --scheme "SwiftUIIntrospectTestFramework" \
            --destination "${{ matrix.destination }}" \
            -- \
            -archivePath ".build/archiving/${{ matrix.name }}" \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES
